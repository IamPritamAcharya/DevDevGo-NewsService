name: Keep News Service Alive

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger pipeline
        run: |
          echo "Triggering backend job..."
          curl -s -X POST https://devdevgo-newsservice.onrender.com/api/trigger || echo "Trigger failed"

      - name: Keep alive during processing (ping every 3 mins for ~20 mins)
        run: |
          echo "Keeping service alive..."
          for i in 1 2 3 4 5 6; do
            sleep 180
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://devdevgo-newsservice.onrender.com/api/health)
            echo "Ping $i → Status: $STATUS"
          done