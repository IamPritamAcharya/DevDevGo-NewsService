services:
  - type: web
    name: devdevgo-news-service
    runtime: docker
    plan: free
    branch: main
    autoDeployTrigger: on_commit
    healthCheckPath: /api/health
    envVars:
      - key: GNEWS_API_KEY
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY_PRIMARY
        sync: false
      - key: GEMINI_API_KEY_FALLBACK
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-service-account.json