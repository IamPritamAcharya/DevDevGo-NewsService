spring.application.name=news-service

server.port=8080

spring.task.scheduling.pool.size=5

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

webclient.connect-timeout=5000
webclient.read-timeout=10000

news.pipeline.interval-hours=1
news.pipeline.top-articles=30
news.pipeline.hn.min-score=50
news.pipeline.hn.top-stories=100
news.pipeline.gnews.max=50
news.pipeline.reddit.min-upvotes=100
news.pipeline.reddit.min-comments=20
news.pipeline.rss.max-age-hours=12
news.pipeline.dedup.similarity-threshold=0.7
news.pipeline.dedup.memory-hours=24
news.pipeline.diversity.max-per-topic=5
news.pipeline.summarizer.max-words=80
news.pipeline.summarizer.request-delay-ms=20000
news.pipeline.summarizer.content-max-words=800

news.api.gnews-key=${GNEWS_API_KEY:your_gnews_key_here}
news.api.reddit-client-id=${REDDIT_CLIENT_ID:not_needed}
news.api.reddit-client-secret=${REDDIT_CLIENT_SECRET:not_needed}
news.api.gemini-key-primary=${GEMINI_API_KEY_PRIMARY:your_gemini_key_1_here}
news.api.gemini-key-fallback=${GEMINI_API_KEY_FALLBACK:your_gemini_key_2_here}

news.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
news.firebase.database-url=${FIREBASE_DATABASE_URL:https://your-project.firebaseio.com}